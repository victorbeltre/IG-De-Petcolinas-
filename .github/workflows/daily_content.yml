name: PetColinas — Publicar Carrusel

on:
  # Disparo manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      post_dir:
        description: "Carpeta del carrusel en posts/ (ej: vacunas)"
        required: true
        type: string

  # Disparo automatico: Claude actualiza publish.json y hace push
  push:
    branches:
      - main
    paths:
      - 'publish.json'

  # Publicacion programada — hora RD (UTC-4). Corre todos los dias; si no hay
  # post programado para la fecha, el job termina sin publicar (no falla).
  #   13:00 UTC = 9:00 AM RD  -> schedule.json
  #   16:00 UTC = 12:00 PM RD -> schedule_mediodia.json
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'

permissions:
  contents: read

jobs:
  publicar-carrusel:
    name: Carrusel → Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Resolver carpeta del post
        id: resolver
        run: |
          EVENT="${{ github.event_name }}"
          echo "Disparado por: $EVENT"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "post_dir=${{ inputs.post_dir }}" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "push" ]; then
            POST_DIR=$(python3 -c "import json; print(json.load(open('publish.json'))['post_dir'])")
            echo "post_dir=$POST_DIR" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "schedule" ]; then
            TODAY=$(date -u '+%Y-%m-%d')
            HOUR=$(date -u '+%H')
            if [ "$HOUR" = "16" ]; then SCHED=schedule_mediodia.json; else SCHED=schedule.json; fi
            POST_DIR=$(python3 -c "import json; print(json.load(open('$SCHED')).get('$TODAY',''))")
            echo "Fecha=$TODAY  Hora=${HOUR}UTC  Schedule=$SCHED  Post='$POST_DIR'"
            if [ -z "$POST_DIR" ]; then
              echo "Sin post programado en $SCHED para $TODAY — nada que publicar."
            else
              if [ ! -f "posts/$POST_DIR/slide_01.png" ]; then
                echo "ERROR: Slides no encontradas en posts/$POST_DIR/ — ejecuta generar_carruseles primero"
                exit 1
              fi
            fi
            echo "post_dir=$POST_DIR" >> $GITHUB_OUTPUT
          fi

      - name: Publicar carrusel en Instagram
        if: steps.resolver.outputs.post_dir != ''
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          POST_DIR: ${{ steps.resolver.outputs.post_dir }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: python publish_carousel.py
