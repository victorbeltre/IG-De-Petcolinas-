name: PetColinas — Publicar Carrusel

on:
  # Disparo manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      post_dir:
        description: "Carpeta del carrusel en posts/ (ej: vacunas)"
        required: true
        type: string

  # Disparo automatico: Claude actualiza publish.json y hace push
  push:
    branches:
      - main
    paths:
      - 'publish.json'

  # Publicacion programada diaria — 9:00 AM hora RD (UTC-4) = 13:00 UTC
  # Todos los dias EXCEPTO martes (PetColinas esta cerrado)
  schedule:
    - cron: '0 13 * * 0,1,3,4,5,6'

permissions:
  contents: read

jobs:
  publicar-carrusel:
    name: Carrusel → Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Resolver carpeta del post
        id: resolver
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "post_dir=${{ inputs.post_dir }}" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "push" ]; then
            POST_DIR=$(python3 -c "import json; print(json.load(open('publish.json'))['post_dir'])")
            echo "post_dir=$POST_DIR" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "schedule" ]; then
            TODAY=$(date -u '+%Y-%m-%d')
            POST_DIR=$(python3 -c "import json,sys; d=json.load(open('schedule.json')).get('$TODAY'); d or (print('ERROR: no hay post para $TODAY',file=sys.stderr) or sys.exit(1)); print(d)")
            echo "post_dir=$POST_DIR" >> $GITHUB_OUTPUT
          fi

      - name: Publicar carrusel en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          POST_DIR: ${{ steps.resolver.outputs.post_dir }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: python publish_carousel.py
