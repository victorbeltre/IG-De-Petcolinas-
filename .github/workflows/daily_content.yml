name: PetColinas — Contenido Diario Automatico

on:
  schedule:
    # 9:00 AM hora Republica Dominicana (UTC-4) = 13:00 UTC
    # Todos los dias EXCEPTO martes (PetColinas cerrado)
    - cron: '0 13 * * 0,1,3,4,5,6'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-y-publicar:
    name: Claude + Nano Banana 2 → Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar contenido (Claude + claude-banana + Nano Banana 2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_content.py

      - name: Commit imagen al repositorio
        run: |
          git config user.name "PetColinas Bot"
          git config user.email "petcolinas-bot@users.noreply.github.com"
          git add post_del_dia.jpg caption.txt
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Post automatico PetColinas $(date +%Y-%m-%d)"
            git push
          fi

      - name: Esperar propagacion CDN de GitHub (15s)
        run: sleep 15

      - name: Publicar en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMAGE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main/post_del_dia.jpg"
        run: |
          export CAPTION=$(cat caption.txt)
          python publish_to_ig.py
