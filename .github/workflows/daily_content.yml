name: PetColinas — Publicar Carrusel

on:
  workflow_dispatch:
    inputs:
      post_dir:
        description: "Carpeta del carrusel en posts/ (ej: semana-01)"
        required: true
        type: string

  # Descomenta el bloque schedule para publicacion automatica programada.
  # Cuando el schedule este activo, el bot publicara la carpeta posts/scheduled/
  # (cambia el contenido de esa carpeta antes de cada publicacion).
  # schedule:
  #   # 9:00 AM hora Republica Dominicana (UTC-4) = 13:00 UTC
  #   # Todos los dias EXCEPTO martes (PetColinas esta cerrado)
  #   - cron: '0 13 * * 0,1,3,4,5,6'

permissions:
  contents: read

jobs:
  publicar-carrusel:
    name: Carrusel → Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Publicar carrusel en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          # workflow_dispatch usa el input; schedule usa "scheduled" como carpeta fija.
          POST_DIR: ${{ inputs.post_dir || 'scheduled' }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: python publish_carousel.py
