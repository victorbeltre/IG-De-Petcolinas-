name: PetColinas — Contenido Diario Automatico

on:
  schedule:
    # 9:00 AM hora Republica Dominicana (UTC-4) = 13:00 UTC
    # Todos los dias EXCEPTO martes (PetColinas cerrado)
    - cron: '0 13 * * 0,1,3,4,5,6'

  workflow_dispatch:

jobs:
  generar-y-publicar:
    name: Claude + FLUX → Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar orquestador (Claude + FLUX → Instagram)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: python generate_content.py
