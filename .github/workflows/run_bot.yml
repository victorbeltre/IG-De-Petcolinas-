name: Bot PetColinas Automatico
on:
  schedule:
    - cron: '0 13 * * *' # Esto es exactamente las 9:00 AM hora RD (13:00 UTC)
  workflow_dispatch: # Esto te deja probarlo manualmente con un boton

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install requests google-generativeai

      - name: Ejecutar Publicacion
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          python -c "
          import os, requests, random, google.generativeai as genai
          
          # Configuración
          genai.configure(api_key=os.getenv('GOOGLE_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')
          
          # Generar contenido
          prompt = 'Eres PetColinas (Veterinaria en SDO). WhatsApp 809-752-6806. Crea un post de IG dominicano sobre grooming o salud. Solo el caption.'
          caption = model.generate_content(prompt).text
          
          # Imagen aleatoria profesional
          temas = ['dog-grooming', 'puppy', 'veterinary']
          image_url = f'https://loremflickr.com/1080/1080/{random.choice(temas)}/all'
          
          # Publicar en Instagram
          token = os.getenv('IG_ACCESS_TOKEN')
          ig_id = os.getenv('INSTAGRAM_ACCOUNT_ID')
          
          r = requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media', 
              data={'image_url': image_url, 'caption': caption, 'access_token': token}).json()
          
          if 'id' in r:
              requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media_publish', 
                  data={'creation_id': r['id'], 'access_token': token})
              print('¡Post de PetColinas publicado con éxito! 🐾')
          else:
              print(f'Error: {r}')
          "
