name: Publicador PetColinas
on:
  repository_dispatch:
    types: [publicar_post_gemini]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probar Recibo
        run: |
          echo "Gemini mandó esta imagen: ${{ github.event.client_payload.image_url }}"
          echo "Y este caption: ${{ github.event.client_payload.caption }}"

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Requests
        run: pip install requests

      - name: Publicar en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
          CAPTION: ${{ github.event.client_payload.caption }}
        run: |
          python -c "
          import os, requests
          token = os.getenv('IG_ACCESS_TOKEN')
          acc_id = os.getenv('INSTAGRAM_ACCOUNT_ID')
          img = os.getenv('IMAGE_URL')
          cap = os.getenv('CAPTION')
          r = requests.post(f'https://graph.facebook.com/v19.0/{acc_id}/media', data={'image_url': img, 'caption': cap, 'access_token': token}).json()
          if 'id' in r:
              requests.post(f'https://graph.facebook.com/v19.0/{acc_id}/media_publish', data={'creation_id': r['id'], 'access_token': token})
              print('Publicado con éxito')
          else:
              print(f'Error: {r}')
          "
