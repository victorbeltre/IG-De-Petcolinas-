name: Publicador PetColinas Instagram

on:
  # Activado por Gemini via GitHub API
  repository_dispatch:
    types: [publicar_post_gemini]

  # Activado manualmente desde GitHub Actions (para pruebas)
  workflow_dispatch:
    inputs:
      image_url:
        description: "URL publica de la imagen"
        required: true
      caption:
        description: "Caption del post"
        required: true

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Mostrar datos recibidos
        run: |
          echo "=== Datos recibidos de Gemini ==="
          echo "Imagen: $IMAGE_URL"
          echo "Caption (primeros 80 chars): ${CAPTION:0:80}..."
        env:
          IMAGE_URL: ${{ github.event.client_payload.image_url || inputs.image_url }}
          CAPTION: ${{ github.event.client_payload.caption || inputs.caption }}

      - name: Publicar en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMAGE_URL: ${{ github.event.client_payload.image_url || inputs.image_url }}
          CAPTION: ${{ github.event.client_payload.caption || inputs.caption }}
        run: python publish_to_ig.py
