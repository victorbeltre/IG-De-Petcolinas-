run: |
          python -c "
          import os, requests, random
          from google import genai
          from google.genai import types
          
          # 1. Configurar Cliente forzando la versión estable v1
          client = genai.Client(
              api_key=os.getenv('GEMINI_API_KEY'),
              http_options={'api_version': 'v1'}
          )
          
          # 2. Generar Contenido (Usando nombre simple del modelo)
          prompt = 'Eres PetColinas (Veterinaria/Grooming en SDO). WhatsApp 809-752-6806. Crea un post de IG con tono dominicano cercano sobre salud o grooming. Solo devuelve el texto del caption.'
          
          try:
              response = client.models.generate_content(
                  model='gemini-1.5-flash', 
                  contents=prompt
              )
              caption = response.text
          except Exception as e:
              print(f'Error en Gemini: {e}')
              exit(1)
          
          # 3. Imagen profesional aleatoria
          temas = ['dog-grooming', 'puppy', 'veterinary']
          image_url = f'https://loremflickr.com/1080/1080/{random.choice(temas)}/all'
          
          # 4. Publicar en Instagram
          token = os.getenv('IG_ACCESS_TOKEN')
          ig_id = os.getenv('INSTAGRAM_ACCOUNT_ID')
          
          media_res = requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media', 
              data={'image_url': image_url, 'caption': caption, 'access_token': token}).json()
          
          if 'id' in media_res:
              requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media_publish', 
                  data={'creation_id': media_res['id'], 'access_token': token})
              print('¡LOGRADO! Post de PetColinas en Instagram. 🐾')
          else:
              print(f'Error de Meta: {media_res}')
          "
          
