name: Publicador desde Gemini
on:
  repository_dispatch:
    types: [publicar_post_gemini]

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: pip install requests

      - name: Publicar en Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          # Aqui recibimos lo que YO te genere en este chat
          CAPTION: ${{ github.event.client_payload.caption }}
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
        run: |
          python -c "
          import os, requests
          caption = os.getenv('CAPTION')
          image_url = os.getenv('IMAGE_URL')
          token = os.getenv('IG_ACCESS_TOKEN')
          ig_id = os.getenv('INSTAGRAM_ACCOUNT_ID')
          
          # 1. Crear contenedor
          r1 = requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media', 
              data={'image_url': image_url, 'caption': caption, 'access_token': token}).json()
          
          if 'id' in r1:
              # 2. Publicar
              requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media_publish', 
                  data={'creation_id': r1['id'], 'access_token': token})
              print('¡Post de PetColinas publicado con éxito! 🐾')
          else:
              print(f'Error de Meta: {r1}')
          "
