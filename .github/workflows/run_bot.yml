name: Publicador PetColinas
on:
  repository_dispatch:
    types: [publicar_post_gemini] # Este nombre debe ser exacto

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependencias
        run: pip install requests

      - name: Ejecutar Script de Publicación
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          # Recibimos lo que manda Gemini
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
          CAPTION: ${{ github.event.client_payload.caption }}
        run: python publish_to_ig.py
