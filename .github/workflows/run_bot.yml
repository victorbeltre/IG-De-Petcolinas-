name: Publicador Automatico PetColinas
on:
  schedule:
    - cron: '0 13 * * *' # Esto es exactamente las 9:00 AM hora RD
  workflow_dispatch: # Esto mantiene el botón de "Run workflow" para pruebas

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: pip install requests google-genai

      - name: Generar y Publicar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          python -c "
          import os, requests, random
          from google import genai
          
          # 1. Conectar con Gemini
          client = genai.Client(api_key=os.getenv('GEMINI_API_KEY'))
          
          # 2. Instrucciones para el post (Tu identidad de marca)
          prompt = 'Eres PetColinas (Veterinaria/Grooming en SDO). WhatsApp 809-752-6806. Crea un post de IG con tono dominicano cercano sobre salud o grooming. Solo devuelve el texto del caption.'
          response = client.models.generate_content(model='gemini-1.5-flash', contents=prompt)
          caption = response.text
          
          # 3. Imagen profesional aleatoria
          temas = ['dog-grooming', 'puppy', 'veterinary']
          image_url = f'https://loremflickr.com/1080/1080/{random.choice(temas)}/all'
          
          # 4. Publicar en Instagram
          token = os.getenv('IG_ACCESS_TOKEN')
          ig_id = os.getenv('INSTAGRAM_ACCOUNT_ID')
          
          r = requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media', 
              data={'image_url': image_url, 'caption': caption, 'access_token': token}).json()
          
          if 'id' in r:
              requests.post(f'https://graph.facebook.com/v18.0/{ig_id}/media_publish', 
                  data={'creation_id': r['id'], 'access_token': token})
              print('¡LOGRADO! Post de PetColinas publicado.')
          else:
              print(f'Error: {r}')
          "
